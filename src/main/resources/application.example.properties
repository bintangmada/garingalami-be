# Project Settings
spring.application.name=garingalami-be

# ===============================
# DATABASE CONFIGURATION (MYSQL)
# ===============================
# Active this when your MySQL is ready
spring.datasource.url=jdbc:mysql://localhost:3306/garing_alami?createDatabaseIfNotExist=true
spring.datasource.username=<your_db_username>
spring.datasource.password=<your_db_password>
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect

# ===============================
# DATABASE CONFIGURATION (H2 - FALLBACK)
# ===============================
# spring.datasource.url=jdbc:h2:mem:garingdb
# spring.datasource.driverClassName=org.h2.Driver
# spring.datasource.username=sa
# spring.datasource.password=
# spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
# spring.h2.console.enabled=true

# JPA / Hibernate Settings
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# File Upload Settings
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB
